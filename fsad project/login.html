<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUXE — Sign In</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="auth-page">

  <!-- IMAGE SIDE -->
  <div class="auth-image">
    <img src="https://images.unsplash.com/photo-1469334031218-e382a71b716b?w=1000&q=80" alt="Fashion">
    <a href="index.html" class="auth-logo">LUXE</a>
    <div class="auth-image-text">
      <p>New season.</p>
      <p><em>New you.</em></p>
    </div>
  </div>

  <!-- FORM SIDE -->
  <div class="auth-form-side">
    <a href="index.html" class="auth-logo auth-logo--mobile">LUXE</a>

    <!-- TABS -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Create Account</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="form-login" class="auth-form-content">
      <p class="auth-welcome">Welcome back</p>

      <div class="field">
        <label>Email Address</label>
        <input type="email" placeholder="your@email.com">
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" placeholder="••••••••">
      </div>

      <div class="auth-row">
        <label class="auth-remember"><input type="checkbox"> Remember me</label>
        <a href="#" class="auth-forgot">Forgot password?</a>
      </div>

      <button class="btn-auth">Sign In</button>

      <div class="auth-divider"><span>or</span></div>

      <button class="btn-social">Continue with Google</button>
    </div>

    <!-- REGISTER FORM -->
    <div id="form-register" class="auth-form-content" style="display:none">
      <p class="auth-welcome">Create your account</p>

      <div class="form-row form-row--2">
        <div class="field">
          <label>First Name</label>
          <input type="text" placeholder="Aanya">
        </div>
        <div class="field">
          <label>Last Name</label>
          <input type="text" placeholder="Sharma">
        </div>
      </div>

      <div class="field">
        <label>Email Address</label>
        <input type="email" placeholder="your@email.com">
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" placeholder="At least 8 characters">
      </div>

      <div class="field">
        <label>Confirm Password</label>
        <input type="password" placeholder="Repeat password">
      </div>

      <label class="auth-remember" style="margin-bottom:1.5rem">
        <input type="checkbox"> I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
      </label>

      <button class="btn-auth">Create Account</button>
    </div>

  </div>
</div>

<script>
function switchTab(tab) {
  document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
}
</script>
</body>
</html>
